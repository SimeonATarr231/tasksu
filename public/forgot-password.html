<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskSy | Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <!-- CSS -->
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black:   #0a0a0a;
            --white:   #f5f0e8;
            --accent:  #ff4d00;
            --mid:     #1a1a1a;
            --border:  #2a2a2a;
            --muted:   #666;
            --mono:    'Space Mono', monospace;
            --display: 'Syne', sans-serif;
        }

        [data-theme="light"] {
            --black:  #f5f0e8;
            --white:  #0a0a0a;
            --mid:    #e8e3db;
            --border: #d0cbc3;
            --muted:  #888;
        }

        body {
            background: var(--black);
            color: var(--white);
            font-family: var(--mono);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            width: 100%;
            max-width: 440px;
            border: 1px solid var(--border);
            padding: 2.5rem;
        }

        .logo {
            font-family: var(--display);
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 2rem;
            display: block;
            text-decoration: none;
        }

        .card-title {
            font-family: var(--display);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .card-subtitle {
            color: var(--muted);
            font-size: 0.78rem;
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        .field { 
            margin-bottom: 1.25rem; 
        }

        .field label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        .field input {
            width: 100%;
            background: var(--mid);
            border: 1px solid var(--border);
            color: var(--white);
            font-family: var(--mono);
            font-size: 0.85rem;
            padding: 0.85rem 1rem;
            outline: none;
            transition: border-color 0.2s;
            display: block;
        }

        .field input:focus { 
            border-color: var(--accent); 
        }

        .field input::placeholder { 
            color: #444; 
        }

        .submit-btn {
            width: 100%;
            background: var(--accent);
            color: var(--black);
            border: none;
            font-family: var(--display);
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            padding: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: opacity 0.2s;
        }

        .submit-btn:hover { 
            opacity: 0.9; 
        }

        .submit-btn:disabled { 
            opacity: 0.5; cursor: not-allowed; 
        }

        .message {
            font-size: 0.78rem;
            padding: 0.75rem 1rem;
            margin-top: 1rem;
            display: none;
        }

        .message.error {
            background: rgba(255,77,0,0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            display: block;
        }

        .message.success {
            background: rgba(0,255,100,0.08);
            border: 1px solid #00ff64;
            color: #00ff64;
            display: block;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: var(--muted);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.2s;
        }

        .back-link:hover { 
            color: var(--accent); 
        }
    </style>
</head>
<body>
    <div class="card">
        <a href="index.html" class="logo">TaskSy</a>
        <div class="card-title">Forgot password.</div>
        <div class="card-subtitle">
            Enter your email address and we will send you a link to reset your password.
        </div>

        <div class="field">
            <label>Email</label>
            <input type="email" id="forgot-email" placeholder="you@example.com">
        </div>
        <button class="submit-btn" id="forgot-btn">Send Reset Link</button>
        <div class="message" id="forgot-message"></div>
        <a href="index.html" class="back-link">← Back to login</a>
    </div>

    <script>
        const showMessage = (id, text, type) => {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = `message ${type}`;
        };

        document.getElementById('forgot-btn').addEventListener('click', async () => {
            const email = document.getElementById('forgot-email').value.trim();
            const btn = document.getElementById('forgot-btn');

            if (!email) {
                return showMessage('forgot-message', 'Please enter your email address', 'error');
            }

            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const response = await fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
                });

                const data = await response.json();
                showMessage('forgot-message', data.message, 'success');

                // Disable form after success
                document.getElementById('forgot-email').disabled = true;
                btn.style.display = 'none';

            } catch (error) {
                showMessage('forgot-message', 'Could not connect to server', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Reset Link';
            }
        });
    </script>
</body>
</html>
