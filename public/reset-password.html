<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskSU — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:   #0a0a0a;
      --white:   #f5f0e8;
      --accent:  #ff4d00;
      --mid:     #1a1a1a;
      --border:  #2a2a2a;
      --muted:   #666;
      --mono:    'Space Mono', monospace;
      --display: 'Syne', sans-serif;
    }

    [data-theme="light"] {
      --black:  #f5f0e8;
      --white:  #0a0a0a;
      --mid:    #e8e3db;
      --border: #d0cbc3;
      --muted:  #888;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      width: 100%;
      max-width: 440px;
      border: 1px solid var(--border);
      padding: 2.5rem;
    }

    .logo {
      font-family: var(--display);
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2rem;
      display: block;
      text-decoration: none;
    }

    .card-title {
      font-family: var(--display);
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .card-subtitle {
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .field { margin-bottom: 1.25rem; }

    .field label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .input-wrapper {
      position: relative;
      display: block;
    }

    .input-wrapper input {
      width: 100%;
      background: var(--mid);
      border: 1px solid var(--border);
      color: var(--white);
      font-family: var(--mono);
      font-size: 0.85rem;
      padding: 0.85rem 3rem 0.85rem 1rem;
      outline: none;
      transition: border-color 0.2s;
      display: block;
    }

    .input-wrapper input:focus { border-color: var(--accent); }
    .input-wrapper input::placeholder { color: #444; }

    .eye-btn {
      position: absolute;
      top: 50%;
      right: 0.75rem;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 0.25rem;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }

    .eye-btn:hover { color: var(--white); }
    .eye-icon, .eye-off-icon { font-size: 0.9rem; }

    .submit-btn {
      width: 100%;
      background: var(--accent);
      color: var(--black);
      border: none;
      font-family: var(--display);
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      padding: 1rem;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s;
    }

    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .message {
      font-size: 0.78rem;
      padding: 0.75rem 1rem;
      margin-top: 1rem;
      display: none;
    }

    .message.error {
      background: rgba(255,77,0,0.1);
      border: 1px solid var(--accent);
      color: var(--accent);
      display: block;
    }

    .message.success {
      background: rgba(0,255,100,0.08);
      border: 1px solid #00ff64;
      color: #00ff64;
      display: block;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--accent); }

    #invalid-token {
      text-align: center;
      padding: 2rem 0;
      display: none;
    }

    #invalid-token p {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }

    #invalid-token .submit-btn {
      display: inline-block;
      text-decoration: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <a href="login.html" class="logo">TaskSU</a>

    <!-- Shown if token is invalid or expired -->
    <div id="invalid-token">
      <div style="font-family:var(--display);font-size:1.5rem;font-weight:700;margin-bottom:0.5rem;">
        Link expired.
      </div>
      <p>This password reset link is invalid or has expired. Please request a new one.</p>
      <a href="forgot-password.html" class="submit-btn">Request New Link</a>
    </div>

    <!-- Shown if token is valid -->
    <div id="reset-form">
      <div class="card-title">Reset password.</div>
      <div class="card-subtitle">Enter your new password below.</div>

      <div class="field">
        <label>New Password</label>
        <div class="input-wrapper">
          <input type="password" id="new-password" placeholder="min. 6 characters">
          <button class="eye-btn" type="button" data-target="new-password">
            <i class="fa-regular fa-eye eye-icon"></i>
            <i class="fa-regular fa-eye-slash eye-off-icon" style="display:none"></i>
          </button>
        </div>
      </div>

      <div class="field">
        <label>Confirm Password</label>
        <div class="input-wrapper">
          <input type="password" id="confirm-password" placeholder="repeat your password">
          <button class="eye-btn" type="button" data-target="confirm-password">
            <i class="fa-regular fa-eye eye-icon"></i>
            <i class="fa-regular fa-eye-slash eye-off-icon" style="display:none"></i>
          </button>
        </div>
      </div>

      <button class="submit-btn" id="reset-btn">Reset Password</button>
      <div class="message" id="reset-message"></div>
    </div>

    <a href="login.html" class="back-link">← Back to login</a>
  </div>

  <script>
    // Apply saved theme
    const saved = localStorage.getItem('taskfree-theme') || 'dark';
    const applyTheme = (theme) => {
      if (theme === 'system') {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
      } else {
        document.documentElement.setAttribute('data-theme', theme);
      }
    };
    applyTheme(saved);

    const showMessage = (text, type) => {
      const el = document.getElementById('reset-message');
      el.textContent = text;
      el.className = `message ${type}`;
    };

    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    // Validate token on page load
    const validateToken = async () => {
      // Show invalid screen if no token in URL
      if (!token) {
        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('invalid-token').style.display = 'block';
      }

      try {
        const response = await fetch(`/api/auth/validate-reset-token?token=${token}`);
        const data = await response.json();

        if (!data.valid) {
          document.getElementById('reset-form').style.display = 'none';
          document.getElementById('invalid-token').style.display = 'block';
        }
      } catch (error) {
        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('invalid-token').style.display = 'block';
      }
    };

    validateToken();

    // Password toggle
    document.querySelectorAll('.eye-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        const eyeIcon = btn.querySelector('.eye-icon');
        const eyeOffIcon = btn.querySelector('.eye-off-icon');

        if (input.type === 'password') {
          input.type = 'text';
          eyeIcon.style.display = 'none';
          eyeOffIcon.style.display = 'block';
        } else {
          input.type = 'password';
          eyeIcon.style.display = 'block';
          eyeOffIcon.style.display = 'none';
        }
      });
    });

    // Reset password
    document.getElementById('reset-btn').addEventListener('click', async () => {
      const password = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      const btn = document.getElementById('reset-btn');

      if (!password || !confirm) {
        return showMessage('Please fill in both fields', 'error');
      }

      if (password.length < 6) {
        return showMessage('Password must be at least 6 characters', 'error');
      }

      if (password !== confirm) {
        return showMessage('Passwords do not match', 'error');
      }

      btn.disabled = true;
      btn.textContent = 'Resetting...';

      try {
        const response = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });

        const data = await response.json();

        if (!response.ok) {
          showMessage(data.error, 'error');
        } else {
          showMessage('Password reset successfully! Redirecting to login...', 'success');
          document.getElementById('new-password').disabled = true;
          document.getElementById('confirm-password').disabled = true;
          btn.style.display = 'none';
          setTimeout(() => {
            window.location.href = '/login.html';
          }, 2000);
        }

      } catch (error) {
        showMessage('Could not connect to server', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
